<!DOCTYPE html>
<html>
<head>
<title>웹 페이지의 구성요소</title>
<style>
	table, th, td { border : 1px solid black; border-collapse : collapse;
					text-align : center
					}
	th { background-color : yellow;}
	td { background-color : skyblue;}
</style>
</head>
<body>	
	<table style="width:100%">
		<caption>해양생물</caption>
		<tr>
			<th>상어</th>
			<th>고래</th>
			<th>고등어</th>
		</tr>
		<tr>
			<td colspan="2">갈치</td>
			<td rowspan="2">조기</td>
		</tr>
		<tr>
			<td style="background-color:purple">자갈치</td>
			<td>금붕어</td>
		</tr>
	</table>
	<iframe src="http://www.tcpschool.com/html/html_space_framesIframes" style="width:100%; height:600px; border:none"></iframe>
</body>
</html>
